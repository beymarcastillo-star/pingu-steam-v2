<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — Panel Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            background-image: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.15) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 20%, rgba(255,101,132,0.1) 0%, transparent 50%);
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
            text-align: center;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 20px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
        }

        .login-card h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .login-card p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }

        .error-msg {
            color: #ff6584;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo" id="logoContainer">🎬</div>
        <h1 id="nombreEmpresa">Pingu Steam</h1>
        <p>Panel de administración</p>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
        </div>

        <button class="btn-login" onclick="login()">Ingresar</button>
        <p class="error-msg" id="errorMsg">Contraseña incorrecta</p>
    </div>

    <script>
        // Cargar nombre de empresa desde la API
        fetch('/api/config/public')
            .then(r => r.json())
            .then(data => {
                if (data.nombre_empresa) document.getElementById('nombreEmpresa').textContent = data.nombre_empresa;
                if (data.logo) document.getElementById('logoContainer').innerHTML = `<img src="/img/${data.logo}" style="width:80px;height:80px;border-radius:20px;object-fit:cover;">`;
            }).catch(() => {});

        function login() {
            const pass = document.getElementById('password').value;
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            })
            .then(r => r.json())
            .then(data => {
                if (data.ok) window.location.href = '/';
                else document.getElementById('errorMsg').style.display = 'block';
            });
        }
    </script>
</body>
</html>
